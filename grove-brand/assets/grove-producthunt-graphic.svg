<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c1810"/>
  <radialGradient id="ph-glow1" cx="30%" cy="60%" r="55%">
    <stop offset="0%" stop-color="#2d5a38" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#0c1810" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="ph-glow2" cx="85%" cy="20%" r="40%">
    <stop offset="0%" stop-color="#1a3520" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#0c1810" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#ph-glow1)"/>
  <rect width="1200" height="630" fill="url(#ph-glow2)"/>

  <!-- Decorative large icon (background) -->
  <g opacity="0.05" transform="translate(780, -40) scale(2.2)">
    <rect x="100" y="210" width="40" height="52" rx="8" fill="#4fa362"/>
    <polygon points="120,20 30,140 210,140" fill="#4fa362"/>
    <polygon points="120,52 36,166 204,166" fill="#6dc280"/>
    <polygon points="120,84 42,192 198,192" fill="#8edc9f"/>
  </g>

  <!-- PH "Launching Today" badge -->
  <rect x="72" y="72" width="168" height="30" rx="15" fill="#c47a3a" fill-opacity="0.2" stroke="#c47a3a" stroke-opacity="0.5" stroke-width="1"/>
  <text x="88" y="91" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#f2b460">🚀 LAUNCHING TODAY</text>

  <!-- Main headline -->
  <text x="72" y="200" font-family="Syne, sans-serif" font-size="80" font-weight="800" letter-spacing="-0.04em" fill="#f5f7f4">Grove</text>
  <text x="72" y="286" font-family="Instrument Serif, serif" font-style="italic" font-size="52" fill="#6dc280">Manage your trees.</text>

  <!-- Description -->
  <text x="72" y="348" font-family="Syne, sans-serif" font-size="20" fill="#d0d8ce">A Windows desktop worktree manager for Claude Code.</text>
  <text x="72" y="376" font-family="Syne, sans-serif" font-size="20" fill="#a0a89e">Spin up sessions. Track branches. Merge cleanly.</text>

  <!-- Feature pills -->
  <g transform="translate(72, 416)">
    <rect x="0" y="0" width="128" height="30" rx="15" fill="#2d5a38"/>
    <text x="16" y="20" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600" fill="#b8f0c5">Tauri 2 + Rust</text>
  </g>
  <g transform="translate(210, 416)">
    <rect x="0" y="0" width="104" height="30" rx="15" fill="#2d5a38"/>
    <text x="16" y="20" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600" fill="#b8f0c5">React 19</text>
  </g>
  <g transform="translate(324, 416)">
    <rect x="0" y="0" width="104" height="30" rx="15" fill="none" stroke="#2d5a38" stroke-width="1"/>
    <text x="16" y="20" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600" fill="#6dc280">Free + MIT</text>
  </g>
  <g transform="translate(438, 416)">
    <rect x="0" y="0" width="114" height="30" rx="15" fill="none" stroke="#2d5a38" stroke-width="1"/>
    <text x="16" y="20" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600" fill="#6dc280">Windows 10/11</text>
  </g>

  <!-- Bottom CTA -->
  <line x1="72" y1="500" x2="600" y2="500" stroke="#4fa362" stroke-opacity="0.1" stroke-width="1"/>
  <text x="72" y="528" font-family="IBM Plex Mono, monospace" font-size="13" fill="#2d5a38">github.com/baldunderwear/grove</text>

  <!-- Upvote prompt (PH style) -->
  <g transform="translate(920, 260)">
    <rect x="0" y="0" width="200" height="80" rx="12" fill="#1a3520" stroke="#4fa362" stroke-opacity="0.3" stroke-width="1"/>
    <text x="80" y="26" font-family="Syne, sans-serif" font-size="11" font-weight="700" fill="#a0a89e" text-anchor="middle">▲ UPVOTE ON</text>
    <text x="100" y="52" font-family="Syne, sans-serif" font-size="20" font-weight="800" fill="#f5f7f4" text-anchor="middle">Product Hunt</text>
    <text x="100" y="70" font-family="IBM Plex Mono, monospace" font-size="10" fill="#4fa362" text-anchor="middle">producthunt.com</text>
  </g>
</svg>
