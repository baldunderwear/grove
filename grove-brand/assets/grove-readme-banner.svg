<svg width="900" height="120" viewBox="0 0 900 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="120" rx="10" fill="#112416"/>
  <rect width="900" height="120" rx="10" fill="none" stroke="#4fa362" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Gradient accent -->
  <radialGradient id="banner-glow" cx="0%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#2d5a38" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#112416" stop-opacity="0"/>
  </radialGradient>
  <rect width="900" height="120" rx="10" fill="url(#banner-glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="200" height="2" rx="1" fill="url(#line-grad)"/>
  <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#4fa362"/>
    <stop offset="100%" stop-color="#4fa362" stop-opacity="0"/>
  </linearGradient>

  <!-- Icon -->
  <g transform="translate(28, 28)">
    <rect x="24" y="46" width="10" height="14" rx="2" fill="#4fa362"/>
    <polygon points="29,4 8,30 50,30" fill="#4fa362"/>
    <polygon points="29,12 10,36 48,36" fill="#6dc280" opacity="0.75"/>
    <polygon points="29,20 12,44 46,44" fill="#8edc9f" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="98" y="52" font-family="Syne, sans-serif" font-size="24" font-weight="800" letter-spacing="-0.02em" fill="#f5f7f4">Grove</text>
  <!-- Subtitle -->
  <text x="98" y="74" font-family="IBM Plex Mono, monospace" font-size="12" fill="#a0a89e">Worktree manager for Claude Code — launch sessions, manage branches, merge cleanly.</text>

  <!-- Badges right-aligned -->
  <g transform="translate(570, 44)">
    <rect x="0" y="0" width="60" height="22" rx="11" fill="#2d5a38"/>
    <text x="12" y="15" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="600" fill="#b8f0c5">Tauri 2</text>
  </g>
  <g transform="translate(638, 44)">
    <rect x="0" y="0" width="44" height="22" rx="11" fill="none" stroke="#2d5a38" stroke-width="1"/>
    <text x="10" y="15" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="600" fill="#6dc280">MIT</text>
  </g>
  <g transform="translate(690, 44)">
    <rect x="0" y="0" width="60" height="22" rx="11" fill="none" stroke="#2d5a38" stroke-width="1"/>
    <text x="8" y="15" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="600" fill="#6dc280">v1.0.0</text>
  </g>
  <g transform="translate(758, 44)">
    <rect x="0" y="0" width="70" height="22" rx="11" fill="#2d5a38"/>
    <text x="10" y="15" font-family="IBM Plex Mono, monospace" font-size="11" font-weight="600" fill="#b8f0c5">Windows</text>
  </g>
</svg>
