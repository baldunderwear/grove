<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c1810"/>

  <!-- Gradient overlays -->
  <radialGradient id="glow1" cx="22%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#2d5a38" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#0c1810" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glow2" cx="80%" cy="15%" r="45%">
    <stop offset="0%" stop-color="#1a3520" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#0c1810" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#4fa362" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#4fa362" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Icon — large background tree (decorative) -->
  <g opacity="0.06" transform="translate(820, 40)">
    <rect x="148" y="370" width="76" height="96" rx="12" fill="#4fa362"/>
    <polygon points="186,30 40,250 332,250" fill="#4fa362"/>
    <polygon points="186,90 56,290 316,290" fill="#6dc280"/>
    <polygon points="186,150 70,330 302,330" fill="#8edc9f"/>
  </g>

  <!-- Top bar: icon + name + badge -->
  <g transform="translate(72, 72)">
    <!-- Icon -->
    <rect x="0" y="0" width="6" height="16" rx="1" fill="#4fa362"/>
    <polygon points="3,0 -10,18 16,18" fill="#4fa362"/>
    <polygon points="3,5 -8,22 14,22" fill="#6dc280" opacity="0.75"/>

    <!-- Wordmark -->
    <text x="28" y="18" font-family="Syne, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.03em" fill="#f5f7f4">Grove</text>

    <!-- Version badge -->
    <rect x="116" y="4" width="56" height="18" rx="9" fill="none" stroke="#4fa362" stroke-opacity="0.4" stroke-width="1"/>
    <text x="127" y="16" font-family="IBM Plex Mono, monospace" font-size="10" font-weight="500" fill="#6dc280" letter-spacing="0.05em">v1.0.0</text>
  </g>

  <!-- Main headline -->
  <text x="72" y="310" font-family="Syne, sans-serif" font-size="96" font-weight="800" letter-spacing="-0.04em" fill="#f5f7f4">Manage your</text>
  <text x="72" y="410" font-family="Instrument Serif, serif" font-style="italic" font-size="96" fill="#6dc280">trees.</text>

  <!-- Subtitle -->
  <text x="72" y="470" font-family="IBM Plex Mono, monospace" font-size="18" fill="#a0a89e">Worktree manager for Claude Code — launch sessions,</text>
  <text x="72" y="494" font-family="IBM Plex Mono, monospace" font-size="18" fill="#a0a89e">manage branches, merge cleanly.</text>

  <!-- Bottom bar -->
  <line x1="72" y1="540" x2="1128" y2="540" stroke="#4fa362" stroke-opacity="0.12" stroke-width="1"/>

  <!-- URL -->
  <text x="72" y="568" font-family="IBM Plex Mono, monospace" font-size="14" fill="#2d5a38">github.com/baldunderwear/grove</text>

  <!-- Tech badges -->
  <g transform="translate(860, 550)">
    <rect x="0" y="0" width="58" height="22" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="10" y="15" font-family="IBM Plex Mono, monospace" font-size="11" fill="#d0d8ce">Tauri 2</text>
  </g>
  <g transform="translate(926, 550)">
    <rect x="0" y="0" width="38" height="22" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="8" y="15" font-family="IBM Plex Mono, monospace" font-size="11" fill="#d0d8ce">Rust</text>
  </g>
  <g transform="translate(972, 550)">
    <rect x="0" y="0" width="70" height="22" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="8" y="15" font-family="IBM Plex Mono, monospace" font-size="11" fill="#d0d8ce">React 19</text>
  </g>
  <g transform="translate(1050, 550)">
    <rect x="0" y="0" width="70" height="22" rx="4" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="8" y="15" font-family="IBM Plex Mono, monospace" font-size="11" fill="#d0d8ce">Windows</text>
  </g>
</svg>
